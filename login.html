<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind +daisy ui -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Stack Sans Text", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc] min-h-screen flex justify-center items-center">
    <main>
      <div class="bg-white w-[520px] mx-auto h-200 shadow-2xl rounded-xl">
        <div class="flex-col">
          <div class="text-center">
            <img class="mx-auto pb-6" src="./assets/github-logo.png" alt="" />
            <h1 class="text-3xl font-semibold">GitHub Issues Tracker</h1>
            <p class="py-1">Sign in to manage your issues</p>
          </div>
          <div class="bg-base-100 w-[480px] shrink-0 mx-auto">
            <div class="">
             
                <fieldset class="fieldset">
                  <label class="label">Username</label>
                  <input
                  id="userName"
                    type="text"
                    class="input w-full outline-0"
                    placeholder="Enter Username"
                  />
                  <p class="text-[#4A00FF] mb-4">Default: Admin</p>
                  <label class="label">Password</label>
                  <input
                  id="userPassword"
                    type="password"
                    class="input w-full outline-0"
                    placeholder="Enter Password"
                  />
                  <p class="text-[#4A00FF]">Default: admin123</p>

                  <button id="login-btn" class="btn bg-[#4a00ff] text-white mt-4 rounded-lg">
                    Login
                  </button>
                </fieldset>
              
            </div>
            <div class="divider">OR</div>
            <div class="pt-6">
              <p class="text-[#64748B] text-center mb-2">Demo Credentials:</p>
              <div class="text-center py-6 bg-[#f8fafc] rounded-lg">
                <p>Username: admin</p>
                <p>Password: admin123</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="/script/login.js"></script>
  </body>
</html>
